apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-monitoring-portal
  labels:
    app: devops-monitoring-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-monitoring-portal
  template:
    metadata:
      labels:
        app: devops-monitoring-portal
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: devops-monitoring-portal
          image: devops-monitoring-portal:latest
          # Never = use image built locally on Docker Desktop (no registry pull)
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PIPELINE_STATUS_PATH
              value: /data/pipeline-status.json
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          volumeMounts:
            - name: pipeline-status
              mountPath: /data
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
      volumes:
        - name: pipeline-status
          configMap:
            name: pipeline-status
            optional: true
