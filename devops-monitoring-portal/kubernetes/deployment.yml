apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-monitoring-portal
  labels:
    app: devops-monitoring-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-monitoring-portal
  template:
    metadata:
      labels:
        app: devops-monitoring-portal
    spec:
      containers:
        - name: devops-monitoring-portal
          image: devops-monitoring-portal:latest
          # Never = use image built locally on Docker Desktop (no registry pull)
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PIPELINE_STATUS_PATH
              value: /data/pipeline-status.json
          volumeMounts:
            - name: pipeline-status
              mountPath: /data
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: pipeline-status
          configMap:
            name: pipeline-status
            optional: true
