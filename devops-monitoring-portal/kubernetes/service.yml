apiVersion: v1
kind: Service
metadata:
  name: devops-monitoring-portal-service
  labels:
    app: devops-monitoring-portal
spec:
  # LoadBalancer: Docker Desktop publishes the service on localhost (no port-forward needed)
  type: LoadBalancer
  selector:
    app: devops-monitoring-portal
  ports:
    - name: http
      port: 30080
      targetPort: 3000
