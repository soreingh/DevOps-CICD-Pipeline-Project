apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: devops-monitoring-portal
        metrics_path: /metrics
        static_configs:
          - targets:
              - devops-monitoring-portal-service:3000
